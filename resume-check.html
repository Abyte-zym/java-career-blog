<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Java简历诊断 | 免费AI评分 | 秒知简历问题</title>
<meta name="description" content="粘贴你的Java实习简历，立刻得到技术栈、项目描述、关键词覆盖度的评分和建议。免费工具，帮你拿到更多面试机会。">
<meta name="keywords" content="Java简历诊断, 简历评分, Java实习简历, 免费简历优化, 简历检查">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,system-ui,sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:30px;max-width:700px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2)}
h1{font-size:26px;color:#1a1a2e;text-align:center;margin-bottom:5px}
.sub{text-align:center;color:#666;font-size:14px;margin-bottom:25px}
textarea{width:100%;height:200px;border:2px solid #e0e0e0;border-radius:10px;padding:15px;font-size:14px;resize:vertical;font-family:monospace}
textarea:focus{outline:none;border-color:#667eea}
.btn{width:100%;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;padding:15px;border-radius:10px;font-size:18px;font-weight:700;cursor:pointer;margin:15px 0;transition:transform .2s}
.btn:hover{transform:scale(1.02)}
.result{display:none;margin-top:20px}
.score{text-align:center;font-size:48px;font-weight:900;color:#667eea}
.score-label{text-align:center;color:#666;font-size:14px;margin-bottom:20px}
.checks{list-style:none;padding:0}
.checks li{padding:10px 15px;border-radius:8px;margin:8px 0;font-size:14px}
.pass{background:#e8f5e9;border-left:4px solid #4caf50}
.fail{background:#ffebee;border-left:4px solid #f44336}
.tip-item{background:#fff3e0;border-left:4px solid #ff9800}
.donate-box{text-align:center;margin-top:25px;padding:20px;background:#f8f9ff;border-radius:12px}
.donate-box img{width:180px;border-radius:8px;margin:10px}
.tools{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:20px}
.tools a{background:#f0f0f0;color:#333;padding:8px 16px;border-radius:20px;text-decoration:none;font-size:13px}
.tools a:hover{background:#667eea;color:#fff}
</style>
</head>
<body>
<div class="card">
<h1>🔍 Java简历诊断</h1>
<p class="sub">粘贴你的简历文本 → 立刻看到评分和优化建议</p>
<textarea id="cv" placeholder="把你的简历粘贴在这里...

例如：
张三 | Java后端开发实习生
技术栈：Java, Spring Boot, MySQL, Redis
项目经历：
1. 秒杀系统 - 使用Redis+Lua实现库存扣减...
2. RAG知识库 - 基于Spring AI..."></textarea>
<button class="btn" onclick="diagnose()">🔍 立刻诊断</button>

<div class="result" id="result">
  <div class="score"><span id="scoreNum">--</span>分</div>
  <div class="score-label">满分100 · 60分及格 · 80分以上很稳</div>
  <ul class="checks" id="checks"></ul>
  <div class="donate-box">
    <p><strong>☕ 诊断结果对你有用吗？</strong></p>
    <p style="color:#666;font-size:14px">这个工具花了很长时间打磨，如果帮到你，请杯咖啡~</p>
    <img src="qrcode-wx.png" alt="赞赏码">
    <p style="font-size:12px;color:#999">长按识别赞赏</p>
  </div>
  <div class="tools">
    <a href="https://Abyte-zym.github.io/interview-simulator">☕ 面试模拟器</a>
    <a href="https://Abyte-zym.github.io/java-resume-builder">📝 简历生成</a>
    <a href="https://Abyte-zym.github.io/java-career-blog">📚 面试题库</a>
  </div>
</div>
</div>

<script>
function diagnose(){
  const cv=document.getElementById('cv').value.trim();
  if(!cv) return alert('请先粘贴简历内容');
  
  let score=20; //基础分
  const checks=[];
  
  // 技术栈检查
  const techs=['Java','Spring','MyBatis','MySQL','Redis','Docker','Git','Linux','微服务','Spring Cloud','MQ','Spring AI'];
  let found=[];
  techs.forEach(t=>{if(cv.includes(t)){found.push(t);score+=5}});
  
  checks.push({pass:found.length>=5,text:`技术栈覆盖 ${found.length}/12 个核心关键词${found.length<5?' ⚠️ 建议补充微服务/AI/容器等技术':''}`});
  
  // 项目描述检查
  const hasNum=/\d+/.test(cv);
  checks.push({pass:hasNum,text:`项目量化数据 ${hasNum?'✅ 有数字支撑':'❌ 缺少量化结果（如"响应时间降低80%"）'}`});
  
  // 长度检查
  if(cv.length<200) checks.push({pass:false,text:'简历太短 ❌ 建议至少200字以上'});
  else checks.push({pass:true,text:`简历长度 ${cv.length}字 ✅ 内容量适中`});
  
  // 关键词检查
  const keywords=['实习','项目','开发','经验'];
  const kwFound=keywords.filter(k=>cv.includes(k));
  checks.push({pass:kwFound.length>=3,text:`核心关键词覆盖 ${kwFound.length}/4 `+(kwFound.length<3?'⚠️':"✅")});
  
  // 到岗时间
  if(cv.includes('到岗')||cv.includes('入职')) checks.push({pass:true,text:'✅ 包含到岗时间信息'});
  else checks.push({pass:false,text:'❌ 缺少到岗时间 — HR想知道你什么时候能来'});
  
  score=Math.min(100,score);
  document.getElementById('scoreNum').textContent=score;
  
  const ul=document.getElementById('checks');
  ul.innerHTML=checks.map(c=>`<li class="${c.pass?'pass':'fail'}">${c.text}</li>`).join('');
  document.getElementById('result').style.display='block';
  document.getElementById('result').scrollIntoView({behavior:'smooth'});
}
</script>
</body>
</html>
